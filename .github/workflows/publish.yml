name: Publish

on:
  workflow_call:
    inputs:
      tag:
        description: npm dist-tag to publish under
        type: string
        default: latest
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish under
        type: string
        default: latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.0.2

      - uses: jdx/mise-action@d5d61992ae8b09ad81540a33e33b2d8226cce8af # v3.6.3

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v6.3.0
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: mise run setup

      - name: Build
        run: mise run build

      - name: Publish
        run: npm publish --provenance --access public --tag ${{ inputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
